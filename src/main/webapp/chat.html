<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente IA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url(img/Curvas\ verdes\ em\ fundo\ negro.png);
    color:#fff;
}

/* CONTAINER */
.chat-container{
    width: 950px;
    height: 650px;
    background: rgba(16, 22, 20, 0.85);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    border:1px solid rgba(0,255,136,0.15);
}

/* HEADER */
.chat-header{
    padding:20px 25px;
    font-weight:600;
    font-size:18px;
    background:linear-gradient(to right, rgba(0,255,136,0.08), transparent);
    border-bottom:1px solid rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status{
    font-size:13px;
    color:#00ff88;
    display:flex;
    align-items:center;
    gap:6px;
}

.status::before{
    content:"";
    width:8px;
    height:8px;
    background:#00ff88;
    border-radius:50%;
    box-shadow:0 0 10px #00ff88;
}

/* MESSAGES */
.chat-messages{
    flex:1;
    padding:25px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* SCROLL */
.chat-messages::-webkit-scrollbar{
    width:6px;
}
.chat-messages::-webkit-scrollbar-thumb{
    background:rgba(0,255,136,0.25);
    border-radius:10px;
}

/* MESSAGE BASE */
.message{
    max-width:65%;
    padding:14px 18px;
    border-radius:18px;
    font-size:14px;
    line-height:1.6;
    animation:fadeIn 0.25s ease-in-out;
}

/* BOT */
.bot{
    align-self:flex-start;
    background:rgba(0,255,136,0.08);
    border:1px solid rgba(0,255,136,0.25);
    border-bottom-left-radius:5px;
}

/* USER */
.user{
    align-self:flex-end;
    background:#0f3d2e;
    color:#d4f3e4;
    border:1px solid rgba(0,150,90,0.7);
    font-weight:500;
    border-bottom-right-radius:5px;
}

/* INPUT AREA */
.chat-input{
    padding:18px 20px;
    display:flex;
    gap:12px;
    background:rgba(10,15,13,0.95);
    border-top:1px solid rgba(255,255,255,0.05);
}

.chat-input input{
    flex:1;
    padding:14px 18px;
    border-radius:14px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.05);
    color:#fff;
    font-size:14px;
}

.chat-input input::placeholder{
    color:rgba(255,255,255,0.3);
}

.chat-input button{
    padding:14px 22px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#00ff88;
    color:#000;
    font-weight:600;
    transition:0.2s;
}

.chat-input button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,255,136,0.5);
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
}

@media(max-width:1000px){
    .chat-container{
        width:95%;
        height:90%;
    }
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        Assistente Virtual
        <div class="status">Online</div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            Olá 👋 Como posso ajudar você hoje?
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Digite sua mensagem...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
async function enviarMensagem(){

    const input = document.getElementById("userInput");
    const mensagem = input.value.trim();
    const chat = document.getElementById("chatMessages");

    if(mensagem === "") return;

    // Mensagem usuário
    const userDiv = document.createElement("div");
    userDiv.classList.add("message","user");
    userDiv.innerText = mensagem;
    chat.appendChild(userDiv);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Placeholder bot
    const botDiv = document.createElement("div");
    botDiv.classList.add("message","bot");
    botDiv.innerText = "Digitando...";
    chat.appendChild(botDiv);
    chat.scrollTop = chat.scrollHeight;

    try{
        const resposta = await fetch("http://127.0.0.1:8000/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({mensagem:mensagem})
        });

        const dados = await resposta.json();
        botDiv.innerText = dados.resposta;

    }catch{
        botDiv.innerText = "Erro ao conectar com o servidor.";
    }

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        enviarMensagem();
    }
});
</script>

</body>
</html>
